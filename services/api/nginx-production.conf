# Nginx configuration for Social Video Downloader API
# Location: /etc/nginx/sites-available/api.reelsave.me

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=metadata_limit:10m rate=60r/h;
limit_req_zone $binary_remote_addr zone=download_limit:10m rate=20r/h;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Server block for API
server {
    listen 80;
    listen [::]:80;
    server_name api.reelsave.me;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.reelsave.me;

    # SSL Configuration (Let's Encrypt certificates)
    ssl_certificate /etc/letsencrypt/live/api.reelsave.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.reelsave.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request size limits
    client_max_body_size 1M;  # API requests should be small
    client_body_buffer_size 128k;

    # Timeout settings
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 300s;  # Allow time for large file downloads
    keepalive_timeout 30s;

    # Connection limits (max 5 concurrent connections per IP)
    limit_conn conn_limit 5;

    # General rate limiting (100 requests per minute)
    limit_req zone=general_limit burst=20 nodelay;

    # Logging
    access_log /var/log/nginx/api.reelsave.me.access.log;
    error_log /var/log/nginx/api.reelsave.me.error.log;

    # Health check endpoint (no rate limiting)
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Short timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Metadata endpoint (60 requests per hour per IP)
    location = /api/metadata {
        # Apply metadata-specific rate limit with forgiving burst
        limit_req zone=metadata_limit burst=10 nodelay;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Only allow POST
        limit_except POST OPTIONS {
            deny all;
        }
    }

    # Download endpoint (20 requests per hour per IP)
    location = /api/download {
        # Apply download-specific rate limit with small burst
        limit_req zone=download_limit burst=5 nodelay;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for downloads
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;  # 5 minutes
        proxy_read_timeout 300s;  # 5 minutes
        
        # Allow larger responses (for video files)
        proxy_buffering off;  # Stream files directly
        proxy_max_temp_file_size 0;
        
        # Only allow POST
        limit_except POST OPTIONS {
            deny all;
        }
    }

    # Block all other paths
    location / {
        return 404;
    }

    # Block common attack paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }
}
